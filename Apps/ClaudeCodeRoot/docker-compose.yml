name: clauderoot

services:
  claude:
    image: ghcr.io/worph/claude-code-container:1.0.25
    container_name: clauderoot
    restart: unless-stopped
    user: 0:0
    expose:
      - 8080
      - 9090
    labels:
      caddy_0: clauderoot-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      # /login, /logout — no forward_auth, served by MCP server
      caddy_0.0_handle: "/login*"
      caddy_0.0_handle.reverse_proxy: "{{upstreams 9090}}"
      caddy_0.1_handle: "/logout"
      caddy_0.1_handle.reverse_proxy: "{{upstreams 9090}}"
      # /mcp — no forward_auth, MCP server has its own Bearer auth.
      # MCP automation itself is disabled via MCP_ENABLED=false below; with that
      # set, the 9090 server returns 404 for /mcp (auth/login still served).
      caddy_0.2_handle_path: "/mcp*"
      caddy_0.2_handle_path.reverse_proxy: "{{upstreams 9090}}"
      # Everything else — forward_auth via MCP, then proxy to ttyd
      caddy_0.3_handle: ""
      caddy_0.3_handle.forward_auth: "{{upstreams 9090}}"
      caddy_0.3_handle.forward_auth.uri: /auth
      caddy_0.3_handle.forward_auth.@unauthorized.status: "401"
      caddy_0.3_handle.forward_auth.handle_response: "@unauthorized"
      caddy_0.3_handle.forward_auth.handle_response.redir: "* /login"
      caddy_0.3_handle.reverse_proxy: "{{upstreams 8080}}"

      caddy_1: clauderoot-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.0_handle: "/login*"
      caddy_1.0_handle.reverse_proxy: "{{upstreams 9090}}"
      caddy_1.1_handle: "/logout"
      caddy_1.1_handle.reverse_proxy: "{{upstreams 9090}}"
      caddy_1.2_handle_path: "/mcp*"
      caddy_1.2_handle_path.reverse_proxy: "{{upstreams 9090}}"
      caddy_1.3_handle: ""
      caddy_1.3_handle.forward_auth: "{{upstreams 9090}}"
      caddy_1.3_handle.forward_auth.uri: /auth
      caddy_1.3_handle.forward_auth.@unauthorized.status: "401"
      caddy_1.3_handle.forward_auth.handle_response: "@unauthorized"
      caddy_1.3_handle.forward_auth.handle_response.redir: "* /login"
      caddy_1.3_handle.reverse_proxy: "{{upstreams 8080}}"

      caddy_2: clauderoot-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.0_handle: "/login*"
      caddy_2.0_handle.reverse_proxy: "{{upstreams 9090}}"
      caddy_2.1_handle: "/logout"
      caddy_2.1_handle.reverse_proxy: "{{upstreams 9090}}"
      caddy_2.2_handle_path: "/mcp*"
      caddy_2.2_handle_path.reverse_proxy: "{{upstreams 9090}}"
      caddy_2.3_handle: ""
      caddy_2.3_handle.forward_auth: "{{upstreams 9090}}"
      caddy_2.3_handle.forward_auth.uri: /auth
      caddy_2.3_handle.forward_auth.@unauthorized.status: "401"
      caddy_2.3_handle.forward_auth.handle_response: "@unauthorized"
      caddy_2.3_handle.forward_auth.handle_response.redir: "* /login"
      caddy_2.3_handle.reverse_proxy: "{{upstreams 8080}}"
    environment:
      - AUTH_PASSWORD=$APP_DEFAULT_PASSWORD
      # MCP automation disabled on the privileged (root) app. The 9090 auth layer
      # (login/auth/logout) keeps running; only the /mcp endpoint is turned off.
      - MCP_ENABLED=false
    volumes:
      # Docker socket for container management
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      # SSH keys for admin access to host VM (used for system maintenance via sudo)
      - type: bind
        source: /home/admin/.ssh/
        target: /host_ssh/
      # Used for PCS integration
      - type: bind
        source: /DATA/
        target: /DATA/
      # Claude Code workspace persistence
      - type: bind
        source: /DATA/AppData/clauderoot/workspace/
        target: /home/claude/workspace
      # Claude config persistence (contains credentials, settings, and other important data)
      - type: bind
        source: /DATA/AppData/clauderoot/config/
        target: /home/claude/.claude
      # Claude session state file (required for auth persistence across restarts)
      - type: bind
        source: /DATA/AppData/clauderoot/config/.claude.json
        target: /home/claude/.claude.json
    networks:
      pcs: null
    cpu_shares: 70
    deploy:
      resources:
        limits:
          memory: 2048M

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  index: /

  architectures:
    - amd64
    - arm64
  main: clauderoot
  author: Yundera
  category: Developer
  description:
    en_us: |
      Claude Code Container (root) - Web-based terminal interface for Claude Code (Anthropic's CLI for Claude).

      This is the PRIVILEGED variant, intended for PCS administration and debugging. It has full control of the host VM. For sandboxed automation (e.g. n8n via MCP) without host access, install "Claude Code" instead.

      Features:
      - Web-based terminal access to Claude Code
      - Styled login page with session management
      - Persistent workspace volume
      - Claude starts automatically on connection
      - Full administrative power: Docker socket access + SSH access (admin + sudo) to host VM
      - Can perform any maintenance task on the VM

      Default password is auto-generated. Check the app settings for the AUTH_PASSWORD value.
    zh_cn: |
      Claude Code 容器 - Claude Code（Anthropic 的 Claude CLI）的 Web 终端界面。

      功能：
      - 基于 Web 的 Claude Code 终端访问
      - 带会话管理的登录页面
      - 持久化工作区
      - 连接时自动启动 Claude
  developer: Anthropic / Yundera
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ClaudeCodeRoot/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ClaudeCodeRoot/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ClaudeCodeRoot/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ClaudeCodeRoot/screenshot-3.png
  tagline:
    en_us: Web terminal for Claude Code - Anthropic's AI coding assistant
    zh_cn: Claude Code 的 Web 终端 - Anthropic 的 AI 编程助手
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ClaudeCodeRoot/thumbnail.png
  title:
    en_us: Claude Code (root)
    zh_cn: Claude Code (root)
  tips:
    before_install:
      en_us: |
        Authentication options:
        - Anthropic API key (https://console.anthropic.com/), OR
        - Claude Pro/Max subscription (authenticate via OAuth on first run)

        Leave API key empty to use subscription auth.

        Default login password: `$APP_DEFAULT_PASSWORD`

        **This is the privileged (root) app for PCS administration and debugging.** It has full control of the host VM (Docker socket + SSH admin/sudo).

        **MCP automation is disabled on this app.** The programmatic MCP endpoint is intentionally not exposed here. If you want to drive Claude Code from n8n or other agents via MCP, install the standard "Claude Code" app instead.
  # Runs as root INSIDE the casa-img container (only /DATA + docker.sock are in
  # scope here), so host-user provisioning must break out to the host namespace
  # via the docker socket: `docker run -v /:/host alpine chroot /host ...`.
  # Yundera VMs already ship an `admin` sudo user; nsl.sh (auto-managed) does
  # NOT, which is why the /home/admin/.ssh mount comes up empty there and the
  # host-SSH mechanism fails. This block ensures the `admin` user + NOPASSWD
  # sudo + a writable ~/.ssh exist. Idempotent: a no-op where they already do.
  pre-install-cmd: |
    mkdir -p /DATA/AppData/clauderoot/workspace /DATA/AppData/clauderoot/config &&
    touch /DATA/AppData/clauderoot/config/.claude.json &&
    if [ ! -f /DATA/AppData/clauderoot/workspace/CLAUDE.md ]; then
      wget -q https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/ClaudeCodeRoot/pre-install/CLAUDE.md -O /DATA/AppData/clauderoot/workspace/CLAUDE.md
    fi &&
    chown -R 1000:1000 /DATA/AppData/clauderoot &&
    docker run --rm -v /:/host alpine chroot /host /bin/sh -c '
      id admin >/dev/null 2>&1 || useradd -m -s /bin/bash admin
      [ -f /etc/sudoers.d/admin ] || { echo "admin ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/admin; chmod 440 /etc/sudoers.d/admin; }
      install -d -m 700 -o admin -g admin /home/admin/.ssh
      touch /home/admin/.ssh/authorized_keys
      chmod 600 /home/admin/.ssh/authorized_keys
      chown admin:admin /home/admin/.ssh/authorized_keys
    '
