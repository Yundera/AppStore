        4. Create Collections to organize your documents

        **MCP Integration (AI Access):**

        After logging in, set up AI access to your knowledge base:

        1. Go to **Settings > API** and create an API Key
        2. Install mcp-outline: `uvx mcp-outline`
        3. Add to your Claude Code MCP config:
        ```json
        {
          "mcpServers": {
            "outline": {
              "command": "uvx",
              "args": ["mcp-outline"],
              "env": {
                "OUTLINE_API_KEY": "your-api-key",
                "OUTLINE_API_URL": "https://outline-your-domain/api"
              }
            }
          }
        }
        ```

        **Documentation:** [https://docs.getoutline.com](https://docs.getoutline.com)
