  pre-install-cmd: |
    mkdir -p /DATA/AppData/outline/dex &&
    ENV_FILE="/DATA/AppData/casaos/apps/outline/.env" &&
    if [ ! -s "$ENV_FILE" ]; then
      OUTLINE_SECRET_KEY=$(openssl rand -hex 32) &&
      OUTLINE_UTILS_SECRET=$(openssl rand -hex 32) &&
      OUTLINE_OIDC_SECRET=$(openssl rand -hex 32) &&
      printf 'OUTLINE_SECRET_KEY=%s\nOUTLINE_UTILS_SECRET=%s\nOUTLINE_OIDC_SECRET=%s\n' \
        "$OUTLINE_SECRET_KEY" "$OUTLINE_UTILS_SECRET" "$OUTLINE_OIDC_SECRET" > "$ENV_FILE"
    fi &&
    . "$ENV_FILE" &&
    DEX_CONFIG="/DATA/AppData/outline/dex/config.yaml" &&
    if [ ! -f "$DEX_CONFIG" ]; then
      BCRYPT_HASH=$(docker run --rm ghcr.io/dexidp/dex:v2.45.1 dex hash "$APP_DEFAULT_PASSWORD" 2>/dev/null || true) &&
      if [ -z "$BCRYPT_HASH" ]; then
        BCRYPT_HASH=$(docker run --rm python:3.12-alpine sh -c "pip install -q bcrypt && python3 -c \"import bcrypt; print(bcrypt.hashpw(b'$APP_DEFAULT_PASSWORD', bcrypt.gensalt(10)).decode())\"" 2>/dev/null)
      fi &&
      PCS_EMAIL="${APP_EMAIL:-admin@$APP_DOMAIN}" &&
      cat > "$DEX_CONFIG" << 'DEXEOF'
    issuer: https://outline-auth-__APP_DOMAIN__
    storage:
      type: sqlite3
      config:
        file: /data/dex.db
    web:
      http: 0.0.0.0:5556
    staticClients:
      - id: outline
        secret: __OIDC_SECRET__
        name: Outline
        redirectURIs:
          - https://outline-__APP_DOMAIN__/auth/oidc.callback
    enablePasswordDB: true
    staticPasswords:
      - email: "__PCS_EMAIL__"
        hash: "__BCRYPT_HASH__"
        username: admin
    DEXEOF
      sed -i "s|__APP_DOMAIN__|$APP_DOMAIN|g" "$DEX_CONFIG" &&
      sed -i "s|__OIDC_SECRET__|$OUTLINE_OIDC_SECRET|g" "$DEX_CONFIG" &&
      sed -i "s|__PCS_EMAIL__|$PCS_EMAIL|g" "$DEX_CONFIG" &&
      sed -i "s|__BCRYPT_HASH__|$BCRYPT_HASH|g" "$DEX_CONFIG"
    fi
