name: outline

services:
  outline:
    image: outlinewiki/outline:1.6.1
    container_name: outline
    restart: unless-stopped
    user: "0:0"
    cpu_shares: 70
    depends_on:
      outline-postgres:
        condition: service_healthy
      outline-redis:
        condition: service_started
      outline-dex:
        condition: service_healthy
    expose:
      - "80"
    labels:
      caddy_0: outline-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: outline-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: outline-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    environment:
      NODE_ENV: production
      PORT: "80"
      URL: https://outline-${APP_DOMAIN}
      SECRET_KEY: ${OUTLINE_SECRET_KEY}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET}
      DATABASE_URL: postgres://outline:${APP_DEFAULT_PASSWORD}@outline-postgres:5432/outline
      REDIS_URL: redis://outline-redis:6379
      PGSSLMODE: disable
      FILE_STORAGE: local
      FILE_STORAGE_LOCAL_ROOT_DIR: /var/lib/outline/data
      FILE_STORAGE_UPLOAD_MAX_SIZE: "262144000"
      FORCE_HTTPS: "false"
      DEFAULT_LANGUAGE: en_US
      # OIDC ‚ÄĒ Dex authentication
      OIDC_CLIENT_ID: outline
      OIDC_CLIENT_SECRET: ${OUTLINE_OIDC_SECRET}
      OIDC_AUTH_URI: https://outline-auth-${APP_DOMAIN}/auth
      OIDC_TOKEN_URI: http://outline-dex:5556/token
      OIDC_USERINFO_URI: http://outline-dex:5556/userinfo
      OIDC_DISPLAY_NAME: Login
      OIDC_SCOPES: "openid profile email"
    volumes:
      - /DATA/AppData/outline/data/:/var/lib/outline/data/
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/_health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - outline-internal
      - pcs

  outline-dex:
    image: ghcr.io/dexidp/dex:v2.45.1
    container_name: outline-dex
    restart: unless-stopped
    user: "0:0"
    cpu_shares: 50
    expose:
      - "5556"
    labels:
      caddy_0: outline-auth-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 5556}}"
      caddy_1: outline-auth-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 5556}}"
      caddy_2: outline-auth-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 5556}}"
    command: ["dex", "serve", "/data/config.yaml"]
    volumes:
      - /DATA/AppData/outline/dex/:/data/
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5556/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - outline-internal
      - pcs

  outline-postgres:
    image: postgres:16.13-alpine
    container_name: outline-postgres
    restart: unless-stopped
    user: "0:0"
    cpu_shares: 50
    environment:
      POSTGRES_DB: outline
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: $APP_DEFAULT_PASSWORD
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - /DATA/AppData/outline/pgdata/:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outline -d outline"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - outline-internal

  outline-redis:
    image: redis:7.2.13-alpine
    container_name: outline-redis
    restart: unless-stopped
    user: "0:0"
    cpu_shares: 30
    volumes:
      - /DATA/AppData/outline/redis/:/data/
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - outline-internal

networks:
  outline-internal:
    driver: bridge
  pcs:
    name: pcs
    external: true

