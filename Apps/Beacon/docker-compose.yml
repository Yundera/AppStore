name: beacon

services:
  beacon-backend:
    image: ghcr.io/worph/beacon:1.0.16
    container_name: beacon-backend
    hostname: beacon-backend
    restart: unless-stopped
    environment:
      DISCOVERY_INTERVAL: "60"
      DISCOVERY_PORT: "9099"
      MCP_CLIENT_TIMEOUT : 300
      WEB_PORT: "9300"
      LOG_LEVEL: info
      PUBLIC_URL: "https://beacon-${APP_DOMAIN}/mcp"
      # Persistent auth token sourced from /DATA/AppData/beacon/.env (created by
      # pre-install-cmd, symlinked into the compose dir). Survives uninstall, so
      # the token shown to the user no longer rotates on reinstall. NOT $AUTH_HASH,
      # which CasaOS regenerates on every install.
      AUTH_HASH: ${BEACON_AUTH}
      # Surfaces a "Manage remote access" link in the Beacon dashboard pointing
      # at the AppShield-hosted OAuth admin page. Beacon itself does no OAuth.
      OAUTH_ADMIN_URL: "https://beacon-${APP_DOMAIN}/AppShield/oauth"
      TZ: $TZ
    expose:
      - 9300
      - 9099
    networks:
      - pcs
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  beacon-proxy:
    # 2.0.5+ includes the MCP OAuth 2.1 broker (oidc-provider fronting Dex),
    # activated by MCP_OAUTH_RESOURCE below.
    image: ghcr.io/yundera/appshield:2.0.5
    container_name: beacon
    # OIDC identity: the AppShield auth-service builds its OIDC redirect URIs from
    # os.hostname(), and the auth-registrar independently attests this app's name via the
    # container's PTR record, rejecting any redirect URI that doesn't match. Must equal the
    # app name, or Docker defaults the hostname to the random container ID and OIDC registration fails.
    hostname: beacon
    restart: unless-stopped
    expose:
      - 80
    labels:
      caddy_0: beacon-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: beacon-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: beacon-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    user: 0:0
    environment:
      # env mode: take the persistent token from the env (interpolated from the
      # symlinked .env) instead of letting AppShield generate/manage its own, so
      # the proxy and the backend share the exact same value.
      AUTH_HASH_MODE: "env"
      AUTH_HASH: ${BEACON_AUTH}
      BACKEND_HOST: "beacon-backend"
      BACKEND_PORT: "9300"
      LISTEN_PORT: "80"
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092"
      REDIRECT_HOST_SUFFIXES: "${APP_DOMAIN},${APP_PUBLIC_IP_DASH}.nip.io,${APP_PUBLIC_IP_DASH}.sslip.io"
      CREDENTIAL_VALIDATE_URL: "http://casaos-oidc-bridge:8090/validate"
      # MCP OAuth 2.1 broker (opt-in). When set, AppShield runs an OAuth/OIDC
      # authorization server fronting Dex so claude.ai (via DCR) and clients like
      # n8n (via a manually-created client) can reach /mcp with Bearer tokens.
      # Requires an appshield image with MCP OAuth support (see image tag below).
      MCP_OAUTH_RESOURCE: "https://beacon-${APP_DOMAIN}/mcp"
      OAUTH_DATA_DIR: "/data/oauth"
    volumes:
      # Persist DCR/manual clients, signing keys and grants across redeploys.
      - /DATA/AppData/beacon/oauth:/data/oauth
    depends_on:
      - beacon-backend
    networks:
      - pcs
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  main: beacon-backend
  index: /

  # Generate a persistent auth token once and keep it in user space so it does
  # not rotate on uninstall/reinstall. The real file lives under the app's
  # AppData (which survives uninstall); a symlink exposes it as the compose
  # project .env so ${BEACON_AUTH} interpolates for both services.
  # Idempotent: only generates if not already present.
  pre-install-cmd: |
    mkdir -p /DATA/AppData/$AppID /DATA/AppData/$AppID/oauth /DATA/AppData/casaos/apps/$AppID &&
    ENV_FILE=/DATA/AppData/$AppID/.env &&
    if ! grep -q '^BEACON_AUTH=' "$ENV_FILE" 2>/dev/null; then
      echo "BEACON_AUTH=$(openssl rand -hex 64)" >> "$ENV_FILE";
    fi &&
    ln -sf "$ENV_FILE" /DATA/AppData/casaos/apps/$AppID/.env

  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Beacon/icon.png
  thumbnail: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Beacon/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Beacon/screenshot-1.png

  architectures:
    - amd64
  author: Yundera
  category: Developer
  developer: Worph
  title:
    en_us: Beacon
  tagline:
    en_us: Discover and unify MCP servers behind a single endpoint
    fr_fr: Decouvrez et unifiez vos serveurs MCP derriere un seul endpoint
  description:
    en_us: |
      **A local service that discovers and aggregates multiple MCP servers into one endpoint**

      Beacon discovers MCP server containers on your Docker network via UDP broadcast, collects their tool manifests, and exposes them as namespaced tools through a single MCP streamable HTTP endpoint.

      **What you can do:**
      - Automatically discover MCP servers on the same Docker network
      - Access all MCP tools through a single unified endpoint
      - View discovered servers and their tools via the web dashboard
      - Trigger manual discovery scans
      - Tools are namespaced as `{server}__{tool}` to avoid conflicts

      **Think of it like:** A reverse proxy for MCP servers — one endpoint to rule them all.

      **Perfect if you:** Run multiple MCP-enabled apps and want your AI assistant to access all their tools from a single connection.
    fr_fr: |
      **Un service local qui decouvre et agrege plusieurs serveurs MCP en un seul endpoint**

      Beacon decouvre les conteneurs serveurs MCP sur votre reseau Docker via broadcast UDP, collecte leurs manifestes d'outils et les expose comme outils namespaces a travers un seul endpoint HTTP MCP streamable.

      **Ce que vous pouvez faire:**
      - Decouvrir automatiquement les serveurs MCP sur le meme reseau Docker
      - Acceder a tous les outils MCP via un seul endpoint unifie
      - Visualiser les serveurs decouverts et leurs outils via le tableau de bord web
      - Declencher des scans de decouverte manuels
      - Les outils sont namespaces en `{serveur}__{outil}` pour eviter les conflits

      **Parfait si vous:** Executez plusieurs applications MCP et souhaitez que votre assistant IA accede a tous leurs outils depuis une seule connexion.
  tips:
    before_install:
      en_us: |
        **Getting Started**

        Beacon automatically discovers MCP servers on the `pcs` Docker network.

        **Authentication:**
        The web dashboard is protected by your Yundera single sign-on — no extra login.

        **How it works:**
        1. The aggregator broadcasts UDP discovery packets on port 9099
        2. MCP servers using the `mcp-announce` SDK respond with their manifests
        3. Tools are collected and exposed through a single endpoint
        4. The web dashboard shows all discovered servers and tools

        **MCP Integration (for AI/LLMs):**

        Connect your AI assistant to the aggregated endpoint to access all discovered MCP tools at once.

        **Option 1: Public URL (with hash auth)**

        Replace `YOUR_TOKEN` with the auth token shown in the Beacon dashboard.
        The token is persistent — it stays the same across reinstalls.
        ```json
        {
          "mcpServers": {
            "beacon": {
              "type": "http",
              "url": "https://beacon-${APP_DOMAIN}/mcp?hash=YOUR_TOKEN"
            }
          }
        }
        ```

        **Option 2: Local Docker connection (no auth required)**

        For AI assistants running on the same server, connect directly via the Docker network:
        ```json
        {
          "mcpServers": {
            "beacon": {
              "type": "http",
              "url": "http://beacon-backend:9099/mcp"
            }
          }
        }
        ```
        *Note: Requires the AI assistant to be on the `pcs` Docker network.*

        **Web Dashboard:**
        - View all discovered MCP servers at the main URL
        - See available tools per server
        - Trigger manual discovery via the UI

        **Compatible MCP servers:**
        Any MCP server using the `mcp-announce` SDK on the `pcs` network will be automatically discovered. Apps like Lystik, OpenKeep, BrowserMCP, and others are compatible.
      fr_fr: |
        **Pour commencer**

        Beacon decouvre automatiquement les serveurs MCP sur le reseau Docker `pcs`.

        **Authentification:**
        Le tableau de bord web est protege par votre authentification unique Yundera (SSO) — aucune connexion supplementaire.

        **Comment ca marche:**
        1. L'aggregateur envoie des paquets de decouverte UDP sur le port 9099
        2. Les serveurs MCP utilisant le SDK `mcp-announce` repondent avec leurs manifestes
        3. Les outils sont collectes et exposes via un seul endpoint
        4. Le tableau de bord web affiche tous les serveurs et outils decouverts

        **Integration MCP (pour IA/LLMs):**

        Connectez votre assistant IA a l'endpoint agrege pour acceder a tous les outils MCP decouverts.

        **Option 1: URL publique (avec hash auth)**

        Remplacez `YOUR_TOKEN` par le token d'authentification affiche dans le
        tableau de bord Beacon. Le token est persistant — il reste identique
        apres une reinstallation.
        ```json
        {
          "mcpServers": {
            "beacon": {
              "type": "http",
              "url": "https://beacon-${APP_DOMAIN}/mcp?hash=YOUR_TOKEN"
            }
          }
        }
        ```

        **Option 2: Connexion Docker locale (sans auth)**
        ```json
        {
          "mcpServers": {
            "beacon": {
              "type": "http",
              "url": "http://beacon-backend:9099/mcp"
            }
          }
        }
        ```
        *Note: L'assistant IA doit etre sur le reseau Docker `pcs`.*
